# One-shot: create D1 + R2 and print database_id for wrangler.toml
name: Provision Cloudflare (D1 + R2)

on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Create D1 database if missing
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          LIST=$(npx wrangler d1 list --json 2>/dev/null || echo '[]')
          echo "Existing D1 databases:"
          echo "$LIST" | head -c 4000
          ID=$(echo "$LIST" | node -e "
            let d='';
            process.stdin.on('data',c=>d+=c);
            process.stdin.on('end',()=>{
              try {
                const j=JSON.parse(d);
                const rows=Array.isArray(j)?j:(j.result||j);
                const hit=(rows||[]).find(r=>r.name==='cat-and-cobra'||r.name==='catabdcobra');
                if(hit) console.log(hit.uuid||hit.id||'');
              } catch { /* empty */ }
            });
          ")
          if [ -n "${ID:-}" ]; then
            echo "D1 already exists: $ID"
          else
            echo "Creating D1 cat-and-cobra..."
            OUT=$(npx wrangler d1 create cat-and-cobra 2>&1)
            echo "$OUT"
            ID=$(echo "$OUT" | sed -n 's/.*database_id = "\([^"]*\)".*/\1/p' | head -1)
            if [ -z "$ID" ]; then
              ID=$(echo "$OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            fi
          fi
          if [ -z "${ID:-}" ]; then
            echo "Failed to resolve database_id"
            exit 1
          fi
          echo "database_id=$ID" >> "$GITHUB_OUTPUT"
          echo "### D1 database_id" >> "$GITHUB_STEP_SUMMARY"
          echo '\`'"$ID"'\`' >> "$GITHUB_STEP_SUMMARY"
          echo "Put this in wrangler.toml → d1_databases.database_id" >> "$GITHUB_STEP_SUMMARY"

      - name: Create R2 bucket if missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if npx wrangler r2 bucket list 2>/dev/null | grep -q 'cat-and-cobra-media'; then
            echo "R2 bucket cat-and-cobra-media already exists"
          else
            npx wrangler r2 bucket create cat-and-cobra-media || true
          fi

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Ensure wrangler.toml has real id for remote apply
          ID="${{ steps.d1.outputs.database_id }}"
          sed -i "s/database_id = \".*\"/database_id = \"$ID\"/" wrangler.toml
          sed -i 's/^name = "cat-and-cobra"/name = "catabdcobra"/' wrangler.toml || true
          cat wrangler.toml
          npx wrangler d1 migrations apply cat-and-cobra --remote
