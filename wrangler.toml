# Worker name must match Cloudflare connected project (Workers Builds).
name = "catabdcobra"
main = "./src/worker/index.ts"
compatibility_date = "2026-07-13"
compatibility_flags = ["nodejs_compat"]
account_id = "1ddbfa86148b21137f5125cbdd637e8c"

[assets]
directory = "./dist"
binding = "ASSETS"
# Worker owns /catandcobra/* routing (API + prefix). Assets are only via env.ASSETS.
run_worker_first = true

[[routes]]
pattern = "terrerov.com/catandcobra*"
zone_name = "terrerov.com"

[[routes]]
pattern = "www.terrerov.com/catandcobra*"
zone_name = "terrerov.com"

[[d1_databases]]
binding = "DB"
database_name = "cat-and-cobra"
# Real UUID required for deploy — set after:
#   npx wrangler d1 create cat-and-cobra
# or GitHub Action: "Provision Cloudflare (D1 + R2)"
# PLACEHOLDER breaks production deploy (error 10181).
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "cat-and-cobra-media"

[[send_email]]
name = "EMAIL"

[vars]
SESSION_TTL_DAYS = "14"
OTP_TTL_MINUTES = "10"
EMAIL_FROM = "noreply@terrerov.com"
EMAIL_FROM_NAME = "Cat & Cobra Admin"
ENVIRONMENT = "production"
